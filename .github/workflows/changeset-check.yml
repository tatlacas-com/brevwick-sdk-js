name: Changeset check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - 'packages/**'

concurrency:
  group: changeset-check-${{ github.ref }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event.pull_request.draft == false && !contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Require a changeset on PRs that touch packages/**
        run: pnpm changeset status --since="origin/${BASE_REF}"
