name: Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Examples consume brevwick-sdk / brevwick-react via workspace:* and rely
      # on their "types"/"import" export entries, so the packages must be built
      # before the examples type-check and build.
      - run: pnpm --filter brevwick-sdk --filter brevwick-react build
      - run: pnpm build:examples
