name: SDK e2e (live brevwick-api)

# Manual-dispatch only. The real live-API smoke needs:
#   1. A hosted `brevwick-api` image (not yet published — tracked in
#      brevwick-api#10 per this issue's References section).
#   2. `bwctl` shipped inside that image so project/key seeding is a
#      single `docker exec` (today `bwctl` lives in the brevwick-api
#      repo and is built from source per-env).
#   3. A documented admin API endpoint to read back the seeded issue.
#
# Until (1)–(3) land, this workflow is a deliberate green no-op:
# every dispatch path exits 0 with a `::notice::` so the optional
# job satisfies issue #10's "live-API smoke optional but green on
# main" acceptance criterion without falsely reporting success on
# the smoke itself. `pnpm test` in this repo already exercises the
# full SDK → ingest wire against MSW, so the CI gate does not lose
# coverage by keeping the real live-API out of the default `ci.yml`
# flow. A developer who wants to run the smoke locally should follow
# the README in brevwick-api's docker-compose.dev.yml.
#
# When the upstream image is published, replace the `Live-API smoke`
# step below with the real `docker run` + `bwctl seed` + admin
# readback invocations.
on:
  workflow_dispatch:
    inputs:
      api_image_ref:
        description: 'brevwick-api docker image ref (empty = dry run)'
        required: false
        default: ''

jobs:
  sdk-e2e-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tatlacas/brevwick-sdk build

      # No-op smoke. Until upstream pieces (1)–(3) above land, every
      # dispatch path is a deliberate green: the job exists so the
      # workflow_dispatch button is wired up, the pnpm install + sdk
      # build verifies the SDK can be packaged for the smoke, and the
      # notice tells the dispatcher exactly why the smoke is dormant.
      # The `api_image_ref` input is accepted but ignored — the real
      # docker-run / bwctl seed / readback pipeline lands as a single
      # diff once the upstream image is published.
      - name: Live-API smoke (no-op until upstream lands)
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.api_image_ref }}" ]]; then
            echo "::notice::Image ref supplied (${{ inputs.api_image_ref }}) but the live-API smoke is not yet wired up."
          fi
          cat <<'EOF'
          ::notice::Live-API smoke is dormant. The upstream prerequisites
          (hosted brevwick-api image, bwctl in image, admin readback API)
          have not landed yet — see this workflow's header comment for the
          full checklist. The job exits green so the optional smoke never
          reports red on main; replace this step with the real invocations
          once upstream is published.
          EOF
          exit 0
