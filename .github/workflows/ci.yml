name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      # Build brevwick-sdk first so brevwick-react's tsc + vitest can resolve
      # the workspace dep via its published "types"/"import" export entries
      # (packages/sdk/dist/index.d.ts etc.). Without this, a clean CI checkout
      # fails type-check with TS2307 on every `from 'brevwick-sdk'` import.
      - run: pnpm --filter brevwick-sdk build
      - run: pnpm type-check
      - run: pnpm test:cover
      - run: pnpm build
      - name: Upload sdk coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/sdk/coverage/lcov.info,packages/react/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  size-check:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      # On PRs, size-limit-action installs + builds + runs size-limit and
      # posts a diff comment against the base branch. On pushes to main,
      # there's no PR to comment on, so we run the gate manually.
      - name: Size check with PR diff comment
        if: github.event_name == 'pull_request'
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: pnpm
          script: pnpm size
          build_script: build
      - name: Install (push)
        if: github.event_name != 'pull_request'
        run: pnpm install --frozen-lockfile
      - name: Build (push)
        if: github.event_name != 'pull_request'
        run: pnpm build
      - name: Size check (push)
        if: github.event_name != 'pull_request'
        run: pnpm size
