name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      # Build brevwick-sdk first so brevwick-react's tsc + vitest can resolve
      # the workspace dep via its published "types"/"import" export entries
      # (packages/sdk/dist/index.d.ts etc.). Without this, a clean CI checkout
      # fails type-check with TS2307 on every `from 'brevwick-sdk'` import.
      - run: pnpm --filter brevwick-sdk build
      - run: pnpm type-check
      - run: pnpm test:cover
      - run: pnpm build
      - name: Upload sdk coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/sdk/coverage/lcov.info,packages/react/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      # Hand the built artefacts to the size-check job so it doesn't have to
      # re-run install + build from scratch.
      - name: Upload package dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dists
          path: |
            packages/sdk/dist
            packages/react/dist
          retention-days: 1
          if-no-files-found: error

  # PR-only: branch protection requires `size-check` to pass before merge,
  # and `main` only receives squash-merged content that already cleared the
  # gate. Re-running on push to `main` would either be silently lossy
  # (failures with no audience) or duplicate work — so we scope to PRs.
  size-check:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      # `size-limit` is a devDep, and the on-widget-open entry uses
      # `@size-limit/esbuild` to re-bundle with the resolved `modern-screenshot`
      # peer — so we still need a node_modules install. We skip the build
      # because `check` already produced dist/ and we hand it over via the
      # `package-dists` artefact below.
      - name: Install (no build)
        run: pnpm install --frozen-lockfile
      - name: Restore built dist/ from `check`
        uses: actions/download-artifact@v4
        with:
          name: package-dists
          path: packages
      # Run twice: first to capture JSON for the comment renderer regardless
      # of pass/fail, second to render the human-readable table and propagate
      # the non-zero exit when a budget is breached. Cheap — both runs are
      # bounded by the size of the (already-built) artefacts.
      - name: Capture size-limit JSON
        run: pnpm -s size --json > size-report.json || true
      - name: Render PR comment body
        run: node .github/scripts/render-size-report.mjs size-report.json > size-comment.md
      - name: Post / update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: brevwick-size-limit
          path: size-comment.md
      # Final gate: human-readable size-limit output and a non-zero exit if
      # any entry breached its budget. This is the step branch protection
      # should require — `size-check` job status maps directly to this.
      - name: Enforce budgets
        run: pnpm size
