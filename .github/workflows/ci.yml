name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Supply-chain defence: every PR commit must be GPG- or SSH-signed so
  # an attacker who lifts a contributor's GitHub token can't push spoofed
  # commits under a maintainer's name. `changeset-release/main` is exempt
  # because it's auto-generated by the release workflow (github-actions[bot]
  # can't sign without an org-managed bot key).
  verify-signatures:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Require signed commits
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          unverified=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate \
            --jq '.[] | select(.commit.verification.verified == false) | "  \(.sha[0:8]) (\(.commit.verification.reason)) — \(.commit.author.name): \(.commit.message | split("\n")[0])"')
          if [ -n "$unverified" ]; then
            printf '::error::PR contains unverified commits. Sign commits with GPG or SSH: https://docs.github.com/authentication/managing-commit-signature-verification\n'
            printf 'Unverified commits:\n%s\n' "$unverified"
            exit 1
          fi
          echo "All commits verified."

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      # Build @tatlacas/brevwick-sdk first so @tatlacas/brevwick-react's tsc + vitest can resolve
      # the workspace dep via its published "types"/"import" export entries
      # (packages/sdk/dist/index.d.ts etc.). Without this, a clean CI checkout
      # fails type-check with TS2307 on every `from '@tatlacas/brevwick-sdk'` import.
      - run: pnpm --filter @tatlacas/brevwick-sdk build
      - run: pnpm type-check
      - run: pnpm test:cover
      - run: pnpm build
      - name: Upload sdk coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: packages/sdk/coverage/lcov.info,packages/react/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      # Hand the built artefacts to the size-check job so it doesn't have to
      # re-run install + build from scratch.
      - name: Upload package dist artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package-dists
          path: |
            packages/sdk/dist
            packages/react/dist
          retention-days: 1
          if-no-files-found: error

  # PR-only: branch protection requires `size-check` to pass before merge,
  # and `main` only receives squash-merged content that already cleared the
  # gate. Re-running on push to `main` would either be silently lossy
  # (failures with no audience) or duplicate work — so we scope to PRs.
  size-check:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      # `size-limit` is a devDep, and the on-widget-open entry uses
      # `@size-limit/esbuild` to re-bundle with the resolved `modern-screenshot`
      # peer — so we still need a node_modules install. We skip the build
      # because `check` already produced dist/ and we hand it over via the
      # `package-dists` artefact below.
      - name: Install (no build)
        run: pnpm install --frozen-lockfile
      - name: Restore built dist/ from `check`
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package-dists
          path: packages
      # Run twice: first to capture JSON for the comment renderer regardless
      # of pass/fail, second to render the human-readable table and propagate
      # the non-zero exit when a budget is breached. Cheap — both runs are
      # bounded by the size of the (already-built) artefacts.
      - name: Capture size-limit JSON
        run: pnpm -s size --json > size-report.json || true
      - name: Render PR comment body
        run: node .github/scripts/render-size-report.mjs size-report.json > size-comment.md
      - name: Post / update PR comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: brevwick-size-limit
          path: size-comment.md
      # Final gate: human-readable size-limit output and a non-zero exit if
      # any entry breached its budget. This is the step branch protection
      # should require — `size-check` job status maps directly to this.
      - name: Enforce budgets
        run: pnpm size
