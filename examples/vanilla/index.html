<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brevwick — Vanilla example</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }
      button {
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        border-radius: 0.5rem;
        border: 1px solid currentColor;
        background: transparent;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #result {
        margin-top: 1rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }
      .ok {
        color: #0a7f2e;
      }
      .err {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brevwick vanilla example</h1>
      <p>
        Click the button to submit a hard-coded report via
        <code>brevwick-sdk</code>.
      </p>
      <button id="send" type="button">Send feedback</button>
      <div id="result" aria-live="polite"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
